name: test
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        compiler: [g++, clang]
        exclude:
          - os: windows-latest
            compiler: g++

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Cmake
        run: |
          rm -rf build
          mkdir build
          cd build
          cmake ..
          make
       
